name: Bug Report
description: File a bug report
type: bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report an issue with a Mage Hand Press premium Foundry package
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What happened and what did you expect to happen?
      placeholder: Tell us what you see!
      value: ""
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: What package are you reporting this for?
      multiple: false
      options:
        - "Book of Extinction"
        - "Dark Matter"
        - "Valda's Spire of Secrets"
        - "The Last Owlbear"
        - "Strange Owlchemy"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the package?
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code.
      render: shell
